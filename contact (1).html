<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إرسال طلب | حِفظون</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f8faf9; padding: 20px; }
        .input-field { width: 100%; p: 12px; border-radius: 15px; border: 1px solid #e1e1e1; outline: none; transition: 0.3s; text-align: right; }
        .input-field:focus { border-color: #0a7a53; box-shadow: 0 0 0 3px rgba(10, 122, 83, 0.1); }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto bg-white rounded-3xl p-8 shadow-xl mt-10 border border-emerald-50">
        <h2 class="text-2xl font-bold text-emerald-900 mb-2 text-center">تواصل معنا</h2>
        <p class="text-center text-gray-500 text-sm mb-6">يسعدنا استقبال بلاغاتكم واقتراحاتكم</p>
        
        <form id="contactForm" class="space-y-4">
            <div>
                <label class="block text-xs text-gray-400 mb-1 mr-2">نوع المراسلة</label>
                <input type="text" id="requestType" readonly class="w-full p-3 bg-emerald-50 rounded-xl text-emerald-700 font-bold border-none outline-none text-center">
            </div>

            <input type="text" id="userName" placeholder="الاسم الكريم" class="input-field p-3" required>

            <textarea id="userMessage" rows="5" placeholder="اكتب تفاصيل البلاغ أو اسم المتن الذي تريده هنا..." class="input-field p-3" required></textarea>

            <button type="submit" id="submitBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl font-bold shadow-lg shadow-emerald-100 transition-all transform active:scale-95">
                إرسال الطلب الآن
            </button>
        </form>

        <button onclick="window.location.href='index.html'" class="w-full mt-4 text-gray-400 text-sm font-medium">العودة للرئيسية</button>
    </div>

    <script type="module">
        // استيراد مكتبات Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // إعدادات الفايربيس الخاصة بك (hafdhun-e1a65)
        const firebaseConfig = {
            apiKey: "AIzaSyDAm8HcluyKRbU0jOxDNIpmQUmdQDGvRIk",
            authDomain: "hafdhun-e1a65.firebaseapp.com",
            databaseURL: "https://hafdhun-e1a65-default-rtdb.firebaseio.com",
            projectId: "hafdhun-e1a65",
            storageBucket: "hafdhun-e1a65.firebasestorage.app",
            messagingSenderId: "143775521185",
            appId: "1:143775521185:web:6e9aff488412e78a10d3e0"
        };

        // تهيئة التطبيق
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // جلب نوع الطلب من عنوان الـ URL (مثلاً: contact.html?type=بلاغ)
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type') || 'تواصل عام';
        document.getElementById('requestType').value = type;

        // عند الضغط على إرسال
        document.getElementById('contactForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "جاري الإرسال...";

            try {
                // إرسال البيانات لمجلد user_reports في قاعدة البيانات
                await push(ref(db, 'user_reports'), {
                    name: document.getElementById('userName').value,
                    message: document.getElementById('userMessage').value,
                    type: document.getElementById('requestType').value,
                    timestamp: serverTimestamp()
                });

                alert("تم استلام رسالتك بنجاح، شكراً لك!");
                window.location.href = "index.html"; // العودة للرئيسية بعد النجاح
            } catch (error) {
                console.error("خطأ في الإرسال:", error);
                alert("حدث خطأ أثناء الإرسال، حاول مرة أخرى.");
                btn.disabled = false;
                btn.innerText = "إرسال الطلب الآن";
            }
        };
    </script>
</body>
</html>
